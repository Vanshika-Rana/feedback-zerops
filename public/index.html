<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Zerops Quickstart</title>
		<style>
			body {
				font-family: sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				background: #0a0a0a;
				color: #fff;
			}
			h1 {
				font-size: 1.5rem;
				margin-bottom: 2rem;
				opacity: 0.7;
			}
			button {
				font-size: 1.2rem;
				padding: 1.2rem 2.4rem;
				border: none;
				border-radius: 12px;
				background: #5c6ac4;
				color: #fff;
				cursor: pointer;
				transition:
					transform 0.1s,
					background 0.2s;
			}
			button:hover {
				background: #4a58b2;
			}
			button:active {
				transform: scale(0.97);
			}
			.subtitle {
				font-size: 1rem;
				opacity: 0.5;
				margin-bottom: 2rem;
				text-align: center;
				max-width: 420px;
			}
			.count {
				margin-top: 1.5rem;
				font-size: 1rem;
				opacity: 0.5;
			}
		</style>
	</head>
	<body>
		<h1>You made it. 🎉</h1>
		<p class="subtitle">
			You just deployed a real app on Zerops — managed database, private
			network, auto-deploy, the whole thing.
		</p>
		<button id="btn">👋 I followed the Zerops quickstart</button>
		<p class="count" id="count">Loading...</p>

		<script>
			const btn = document.getElementById("btn");
			const countEl = document.getElementById("count");

			async function loadCount() {
				const res = await fetch("/count");
				const { count } = await res.json();
				countEl.textContent = `${count} developer${count === 1 ? "" : "s"} deployed this`;
			}

			btn.addEventListener("click", async () => {
				btn.disabled = true;
				const res = await fetch("/click", { method: "POST" });
				const { count } = await res.json();
				countEl.textContent = `${count} developer${count === 1 ? "" : "s"} deployed this`;
				btn.textContent = "🎉 You're in!";
			});

			loadCount();
		</script>
	</body>
</html>
